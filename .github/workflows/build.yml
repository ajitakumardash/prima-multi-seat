# ============================================================
# Prima Multi Seat - Diagnostic CI/CD Pipeline
# Explicitly uncovers hidden compilation errors
# ============================================================

name: Build Prima Multi Seat

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_CONFIG: Release
  BUILD_PLATFORM: x64
  DOTNET_VERSION: '8.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ╔══════════════════════════════════════════════════════╗
  # ║  BUILD PRIMACORE (DIAGNOSTIC)                        ║
  # ╚══════════════════════════════════════════════════════╝
  build-core:
    name: Build PrimaCore (C++)
    # Explicitly pinning to 2022 to isolate from upcoming runner image flips
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-architecture: x64

    # CRITICAL DIAGNOSTIC: /verbosity:normal exposes hidden C++ linker errors and missing headers
    - name: Build PrimaCore (Release x64)
      working-directory: PrimaCore
      run: |
        msbuild PrimaCore.vcxproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:OutDir=..\Build\Release\ `
          /maxcpucount `
          /verbosity:normal `
          /nologo

    - name: Upload PrimaCore artifact
      uses: actions/upload-artifact@v4
      with:
        name: primacore-release
        path: Build/Release/PrimaMultiSeat.exe

  # ╔══════════════════════════════════════════════════════╗
  # ║  BUILD PRIMAUI (DIAGNOSTIC)                          ║
  # ╚══════════════════════════════════════════════════════╝
  build-ui:
    name: Build PrimaUI (WPF .NET 8)
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore NuGet packages
      working-directory: PrimaUI
      run: dotnet restore -r win-x64

    # CRITICAL DIAGNOSTIC: Removed --no-restore to let compiler re-verify WPF dependencies inline
    - name: Build PrimaUI (Release x64)
      working-directory: PrimaUI
      run: |
        dotnet publish `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -o ..\Build\Release `
          /p:PublishSingleFile=true
